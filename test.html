<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тест API</title>
</head>
<body>
    <h1>Тест добавления товара</h1>
    <button onclick="testAdd()">Добавить тестовый товар</button>
    <pre id="result"></pre>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwtyJuhNQJwnIAOihy2yPkfxkymqf6-wNNQX-wWL_SdiR8eChy_YHyT8uPxuoUfpTR9ng/exec';
        
        async function testAdd() {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = 'Отправка...';
            
            try {
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=autoAdd`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        sku: 'TEST-001',
                        model: 'Тестовая модель',
                        serialNumber: 'TEST123',
                        purchasePrice: '1000',
                        description: 'Тестовое описание'
                    })
                });
                
                const data = await response.json();
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.textContent = 'Ошибка: ' + error.message;
            }
        }
    </script>
</body>
</html>
