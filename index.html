<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#1e3c72">
    <link rel="manifest" href="manifest.json">
    <title>QR Сканер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; padding: 16px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 20px; }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; min-width: 80px; padding: 12px 8px; background: rgba(255,255,255,0.2); border: none; border-radius: 12px; color: white; font-size: 14px; font-weight: 600; cursor: pointer; }
        .tab-btn.active { background: white; color: #1e3c72; }
        .panel { display: none; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .panel.active { display: block; }
        h2 { color: #1e3c72; margin-bottom: 20px; font-size: 20px; border-bottom: 2px solid #eef2f7; padding-bottom: 10px; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto; border-radius: 16px; overflow: hidden; }
        button { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; border: none; padding: 14px 28px; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; margin: 10px 0; width: 100%; }
        .search-box { display: flex; gap: 10px; margin: 15px 0; }
        .search-box input { flex: 1; padding: 12px; border: 2px solid #e0e4e8; border-radius: 30px; font-size: 16px; }
        .search-box button { width: auto; padding: 12px 20px; margin: 0; }
        .product-card { background: #f8fafc; border-radius: 16px; padding: 20px; margin-top: 20px; border-left: 4px solid #2a5298; }
        .product-card h3 { color: #1e3c72; margin-bottom: 15px; }
        .product-detail { margin: 8px 0; padding: 8px 0; border-bottom: 1px solid #e2e8f0; }
        .product-detail strong { display: inline-block; min-width: 110px; color: #475569; }
        .error { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 12px; margin-top: 15px; text-align: center; }
        .success { background: #dcfce7; color: #16a34a; padding: 12px; border-radius: 12px; margin-top: 15px; text-align: center; }
        .loading { text-align: center; padding: 30px; color: #64748b; }
        .install-banner { background: #eef2ff; padding: 12px; border-radius: 12px; margin-bottom: 15px; text-align: center; font-size: 14px; display: none; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #1e3c72; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #e0e4e8; border-radius: 30px; font-size: 14px; }
        .price-input-overlay { background: #f8fafc; border-radius: 16px; padding: 15px; margin-top: 15px; border: 2px solid #e2e8f0; }
        .price-input-overlay h4 { color: #1e3c72; margin-bottom: 10px; }
        .price-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .price-buttons button { margin: 0; padding: 10px; font-size: 14px; }
        .model-selector { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .model-btn { flex: 1; background: #eef2ff; color: #1e3c72; border: 2px solid #e0e4e8; padding: 12px; border-radius: 30px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .model-btn.active { background: #1e3c72; color: white; border-color: #1e3c72; }
        .batch-result { margin-top: 15px; max-height: 300px; overflow-y: auto; }
        .batch-item { background: #f8fafc; padding: 10px; margin: 5px 0; border-radius: 8px; font-size: 13px; }
        .batch-success { border-left: 4px solid #16a34a; }
        .batch-error { border-left: 4px solid #dc2626; }
        .batch-pending { border-left: 4px solid #eab308; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📱 QR Сканер</h1>
        <p>Приёмка с указанием цены</p>
    </div>
    
    <div id="install-banner" class="install-banner">
        <div id="android-install" style="display: none;"><button id="install-btn">📲 Установить</button></div>
        <div id="ios-install" style="display: none;">📱 Поделиться → На экран «Домой»</div>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('scan')">📷 Поиск</button>
        <button class="tab-btn" onclick="switchTab('search')">🔍 Артикул</button>
        <button class="tab-btn" onclick="switchTab('receive')">➕ Приёмка</button>
        <button class="tab-btn" onclick="switchTab('batch')">📦 Пакетная</button>
    </div>
    
    <!-- Панель поиска по QR -->
    <div id="scan-panel" class="panel active">
        <h2>📷 Поиск по QR-коду</h2>
        <div id="reader"></div>
        <div id="scan-result"></div>
        <button id="start-scan-btn">▶ Запустить камеру</button>
    </div>
    
    <!-- Панель поиска по артикулу -->
    <div id="search-panel" class="panel">
        <h2>🔍 Поиск по артикулу</h2>
        <div class="search-box">
            <input type="text" id="serial-input" placeholder="Введите артикул (MN2-001)">
            <button onclick="searchBySerial()">Найти</button>
        </div>
        <div id="search-result"></div>
    </div>
    
    <!-- Панель приёмки с возможностью ввода цены -->
    <div id="receive-panel" class="panel">
        <h2>➕ Приём товаров</h2>
        <p style="color: #666; margin-bottom: 15px;">Сканируйте QR-код → укажите цену → товар добавится автоматически</p>
        
        <div id="receive-reader" style="width: 100%; margin-bottom: 15px;"></div>
        <button id="start-receive-scan">📷 Сканировать QR</button>
        
        <!-- Оверлей для ввода цены (появляется после сканирования) -->
        <div id="price-overlay" class="price-input-overlay" style="display: none;">
            <h4>💰 Введите цену для товара</h4>
            <p id="price-model-info" style="color: #666; margin-bottom: 10px;"></p>
            <input type="number" id="price-input" placeholder="Цена в рублях" style="width: 100%; padding: 12px; border-radius: 30px; border: 2px solid #e0e4e8; font-size: 16px;">
            <div class="price-buttons">
                <button id="price-submit" style="background: #16a34a;">✅ Добавить</button>
                <button id="price-skip" style="background: #64748b;">⏭ Пропустить (стандартная цена)</button>
                <button id="price-cancel" style="background: #dc2626;">❌ Отмена</button>
            </div>
        </div>
        
        <div id="receive-result"></div>
    </div>
    
    <!-- Панель пакетной приёмки с ценой -->
    <div id="batch-panel" class="panel">
        <h2>📦 Пакетная приёмка</h2>
        <p style="color: #666; margin-bottom: 15px;">Выберите модель и цену, затем сканируйте QR-коды подряд</p>
        
        <div class="model-selector" id="model-selector">
            <button class="model-btn" data-model="Mini 2" data-price="25000">Mini 2 (25000 ₽)</button>
            <button class="model-btn" data-model="Mini 3" data-price="35000">Mini 3 (35000 ₽)</button>
            <button class="model-btn" data-model="Air 2s" data-price="45000">Air 2s (45000 ₽)</button>
            <button class="model-btn" data-model="Mavic" data-price="80000">Mavic (80000 ₽)</button>
            <button class="model-btn" data-model="3T" data-price="100000">3T (100000 ₽)</button>
        </div>
        
        <div class="form-group">
            <label>💰 Своя цена (оставьте пустым для стандартной)</label>
            <input type="number" id="batch-price" placeholder="Например: 27000">
        </div>
        
        <div id="batch-reader" style="width: 100%; margin-bottom: 15px;"></div>
        <button id="start-batch-scan">📷 Начать сканирование</button>
        <button id="stop-batch-scan" style="background: #64748b;">⏹ Остановить</button>
        
        <div id="batch-result" class="batch-result"></div>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwgRQG4f6GgtuLpD3TTn4_E6KIsLsB-uHMpHP6F2jBrfm8SUYV91zMGGmZi3imU-d5AFw/exec';
    
    let html5QrCode = null;
    let receiveQrCode = null;
    let batchQrCode = null;
    let isScanning = false;
    let isReceiveScanning = false;
    let isBatchScanning = false;
    let currentProduct = null;
    let pendingScanData = null;
    let selectedModel = 'Mini 2';
    let selectedModelPrice = 25000;
    let batchResults = [];
    
    // Стандартные цены моделей
    const defaultPrices = {
        'Mini 2': 25000,
        'Mini 3': 35000,
        'Air 2s': 45000,
        'Mavic': 80000,
        '3T': 100000
    };
    
    // PWA
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const isAndroid = /Android/.test(navigator.userAgent);
    if (isAndroid) {
        document.getElementById('android-install').style.display = 'block';
        document.getElementById('install-banner').style.display = 'block';
        let deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });
        document.getElementById('install-btn')?.addEventListener('click', async () => {
            if (!deferredPrompt) { alert('Установка через Chrome'); return; }
            deferredPrompt.prompt();
            deferredPrompt = null;
        });
    } else if (isIOS) {
        document.getElementById('ios-install').style.display = 'block';
        document.getElementById('install-banner').style.display = 'block';
    }
    
    // Выбор модели для пакетной приёмки
    document.querySelectorAll('.model-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedModel = btn.dataset.model;
            selectedModelPrice = parseInt(btn.dataset.price);
        });
    });
    document.querySelector('.model-btn').classList.add('active');
    
    function switchTab(tab) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab + '-panel').classList.add('active');
        event.target.classList.add('active');
        
        if (tab === 'scan') { stopReceiveScanner(); stopBatchScanner(); }
        if (tab === 'receive') { stopScanner(); stopBatchScanner(); }
        if (tab === 'batch') { stopScanner(); stopReceiveScanner(); }
        
        // Скрываем оверлей при смене вкладки
        document.getElementById('price-overlay').style.display = 'none';
        pendingScanData = null;
    }
    
    // ========== ОСНОВНОЙ СКАНЕР (поиск) ==========
    async function startScanner() {
        const resultDiv = document.getElementById('scan-result');
        resultDiv.innerHTML = '<div class="loading">📷 Запуск камеры...</div>';
        if (html5QrCode && isScanning) await html5QrCode.stop();
        html5QrCode = new Html5Qrcode("reader");
        try {
            await html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 300, height: 300 } },
                async (text) => {
                    await html5QrCode.stop();
                    isScanning = false;
                    resultDiv.innerHTML = '<div class="loading">🔍 Поиск...</div>';
                    try {
                        const product = await findProductBySerial(text);
                        currentProduct = product;
                        displayProduct(product, 'scan-result');
                    } catch(e) {
                        resultDiv.innerHTML = `<div class="error">❌ ${e.message}</div>`;
                    }
                },
                (err) => console.log(err)
            );
            isScanning = true;
            resultDiv.innerHTML = '<div class="success">✅ Камера работает. Наведите на QR-код.</div>';
        } catch(e) {
            resultDiv.innerHTML = '<div class="error">❌ Ошибка камеры.</div>';
        }
    }
    
    function stopScanner() {
        if (html5QrCode && isScanning) html5QrCode.stop().then(() => isScanning = false);
    }
    
    // ========== ПРИЁМКА С ВВОДОМ ЦЕНЫ ==========
    async function startReceiveScanner() {
        const resultDiv = document.getElementById('receive-result');
        resultDiv.innerHTML = '<div class="loading">📷 Запуск камеры...</div>';
        if (receiveQrCode && isReceiveScanning) await receiveQrCode.stop();
        
        receiveQrCode = new Html5Qrcode("receive-reader");
        try {
            await receiveQrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 300, height: 300 } },
                async (text) => {
                    await receiveQrCode.stop();
                    isReceiveScanning = false;
                    
                    // Определяем модель по QR-коду
                    let model = null;
                    let priceFromQR = null;
                    
                    // Парсим QR-код
                    if (text.includes(':')) {
                        const parts = text.split('|');
                        for (let part of parts) {
                            if (part.startsWith('MODEL:')) model = part.replace('MODEL:', '');
                            if (part.startsWith('PRICE:')) priceFromQR = parseInt(part.replace('PRICE:', ''));
                        }
                    } else {
                        // Простой текст — это модель
                        const modelMap = {
                            'MINI2': 'Mini 2', 'MINI3': 'Mini 3', 'AIR2S': 'Air 2s',
                            'MAVIC': 'Mavic', '3T': '3T', 'Mini 2': 'Mini 2',
                            'Mini 3': 'Mini 3', 'Air 2s': 'Air 2s', 'Mavic': 'Mavic'
                        };
                        model = modelMap[text] || text;
                    }
                    
                    // Проверяем модель
                    if (!defaultPrices[model]) {
                        resultDiv.innerHTML = `<div class="error">❌ Неизвестная модель: ${model}. Доступные: Mini 2, Mini 3, Air 2s, Mavic, 3T</div>`;
                        return;
                    }
                    
                    // Сохраняем данные для оверлея
                    pendingScanData = {
                        model: model,
                        qrText: text,
                        priceFromQR: priceFromQR
                    };
                    
                    // Показываем оверлей для ввода цены
                    const overlay = document.getElementById('price-overlay');
                    const modelInfo = document.getElementById('price-model-info');
                    const priceInput = document.getElementById('price-input');
                    
                    if (priceFromQR) {
                        modelInfo.innerHTML = `📦 Модель: <strong>${model}</strong><br>💰 Цена в QR: ${priceFromQR} ₽`;
                        priceInput.value = priceFromQR;
                    } else {
                        modelInfo.innerHTML = `📦 Модель: <strong>${model}</strong><br>💰 Стандартная цена: ${defaultPrices[model]} ₽`;
                        priceInput.value = '';
                    }
                    
                    overlay.style.display = 'block';
                    priceInput.focus();
                    resultDiv.innerHTML = '';
                },
                (err) => console.log(err)
            );
            isReceiveScanning = true;
            resultDiv.innerHTML = '<div class="success">✅ Камера работает. Сканируйте QR-код товара.</div>';
        } catch(e) {
            resultDiv.innerHTML = '<div class="error">❌ Ошибка камеры.</div>';
        }
    }
    
    async function submitWithPrice() {
        if (!pendingScanData) return;
        
        const priceInput = document.getElementById('price-input');
        let price = parseInt(priceInput.value);
        
        // Если цена не указана, используем стандартную
        if (isNaN(price)) {
            price = defaultPrices[pendingScanData.model];
        }
        
        const resultDiv = document.getElementById('receive-result');
        resultDiv.innerHTML = '<div class="loading">💾 Добавление товара...</div>';
        document.getElementById('price-overlay').style.display = 'none';
        
        try {
            const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=autoAdd`, {
                method: 'POST',
                body: JSON.stringify({ 
                    model: pendingScanData.model, 
                    price: price 
                })
            });
            const data = await response.json();
            
            if (data.success) {
                resultDiv.innerHTML = `<div class="success">${data.message}<br>💰 Цена: ${data.price} ₽<br>🔢 Артикул: ${data.sku}</div>`;
                if (navigator.vibrate) navigator.vibrate(200);
            } else {
                resultDiv.innerHTML = `<div class="error">❌ ${data.message}</div>`;
            }
        } catch (error) {
            resultDiv.innerHTML = `<div class="error">❌ Ошибка: ${error.message}</div>`;
        }
        
        pendingScanData = null;
        
        // Перезапускаем сканер
        setTimeout(() => {
            startReceiveScanner();
        }, 1000);
    }
    
    function submitWithDefaultPrice() {
        if (!pendingScanData) return;
        
        const price = defaultPrices[pendingScanData.model];
        document.getElementById('price-input').value = price;
        submitWithPrice();
    }
    
    function cancelPriceInput() {
        document.getElementById('price-overlay').style.display = 'none';
        pendingScanData = null;
        // Перезапускаем сканер
        setTimeout(() => {
            startReceiveScanner();
        }, 500);
    }
    
    function stopReceiveScanner() {
        if (receiveQrCode && isReceiveScanning) receiveQrCode.stop().then(() => isReceiveScanning = false);
        document.getElementById('price-overlay').style.display = 'none';
        pendingScanData = null;
    }
    
    // ========== ПАКЕТНАЯ ПРИЁМКА ==========
    async function startBatchScanner() {
        const resultDiv = document.getElementById('batch-result');
        batchResults = [];
        resultDiv.innerHTML = '<div class="loading">📷 Запуск камеры. Сканируйте QR-коды подряд...</div>';
        
        if (batchQrCode && isBatchScanning) await batchQrCode.stop();
        
        batchQrCode = new Html5Qrcode("batch-reader");
        try {
            await batchQrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 300, height: 300 } },
                async (text) => {
                    let price = document.getElementById('batch-price').value;
                    const priceNum = price ? parseInt(price) : selectedModelPrice;
                    
                    const resultItem = { text: text, status: 'pending', message: 'Добавляется...' };
                    batchResults.push(resultItem);
                    updateBatchResults();
                    
                    try {
                        const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=autoAdd`, {
                            method: 'POST',
                            body: JSON.stringify({ model: selectedModel, price: priceNum })
                        });
                        const data = await response.json();
                        
                        const index = batchResults.findIndex(r => r.text === text);
                        if (index !== -1) {
                            if (data.success) {
                                batchResults[index] = { text: text, status: 'success', message: data.sku, price: data.price };
                            } else {
                                batchResults[index] = { text: text, status: 'error', message: data.message };
                            }
                        }
                        updateBatchResults();
                        if (navigator.vibrate) navigator.vibrate(100);
                    } catch (error) {
                        const index = batchResults.findIndex(r => r.text === text);
                        if (index !== -1) {
                            batchResults[index] = { text: text, status: 'error', message: error.message };
                        }
                        updateBatchResults();
                    }
                },
                (err) => console.log(err)
            );
            isBatchScanning = true;
        } catch(e) {
            resultDiv.innerHTML = '<div class="error">❌ Ошибка камеры.</div>';
        }
    }
    
    function stopBatchScanner() {
        if (batchQrCode && isBatchScanning) batchQrCode.stop().then(() => isBatchScanning = false);
    }
    
    function updateBatchResults() {
        const container = document.getElementById('batch-result');
        const successCount = batchResults.filter(r => r.status === 'success').length;
        const errorCount = batchResults.filter(r => r.status === 'error').length;
        
        let html = `<div class="success">📊 Добавлено: ${successCount} | Ошибок: ${errorCount} | Всего: ${batchResults.length}</div>`;
        batchResults.forEach(r => {
            const statusClass = r.status === 'success' ? 'batch-success' : (r.status === 'error' ? 'batch-error' : 'batch-pending');
            html += `<div class="batch-item ${statusClass}">
                ${r.status === 'success' ? '✅' : (r.status === 'error' ? '❌' : '⏳')} 
                ${r.message}
                ${r.price ? ` — ${r.price} ₽` : ''}
            </div>`;
        });
        container.innerHTML = html;
    }
    
    // ========== ПОИСК ==========
    async function searchBySerial() {
        const serial = document.getElementById('serial-input').value.trim();
        const resultDiv = document.getElementById('search-result');
        if (!serial) {
            resultDiv.innerHTML = '<div class="error">❌ Введите артикул</div>';
            return;
        }
        resultDiv.innerHTML = '<div class="loading">🔍 Поиск...</div>';
        try {
            const product = await findProductBySerial(serial);
            currentProduct = product;
            displayProduct(product, 'search-result');
        } catch(e) {
            resultDiv.innerHTML = `<div class="error">❌ ${e.message}</div>`;
        }
    }
    
    async function findProductBySerial(serial) {
        const res = await fetch(`${GOOGLE_SCRIPT_URL}?serial=${encodeURIComponent(serial)}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        return data;
    }
    
    function displayProduct(p, containerId) {
        const container = document.getElementById(containerId);
        let price = p['Цена'];
        if (price && !isNaN(parseFloat(price))) price = `${parseFloat(price).toLocaleString('ru-RU')} ₽`;
        
        let html = `<div class="product-card">
            <h3>🚁 ${escapeHtml(p['Название'] || 'Без названия')}</h3>
            <div class="product-detail"><strong>🔢 Артикул:</strong> ${escapeHtml(p['Серийный номер'] || '—')}</div>
            <div class="product-detail"><strong>📝 Описание:</strong> ${escapeHtml(p['Описание'] || '—')}</div>
            ${p['Категория'] ? `<div class="product-detail"><strong>📂 Модель:</strong> ${escapeHtml(p['Категория'])}</div>` : ''}
            ${price ? `<div class="product-detail"><strong>💰 Цена:</strong> ${price}</div>` : ''}
        </div>`;
        container.innerHTML = html;
    }
    
    function escapeHtml(s) {
        if (!s) return '';
        return String(s).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
    
    // ========== НАЗНАЧЕНИЕ ОБРАБОТЧИКОВ ==========
    document.getElementById('start-scan-btn').onclick = startScanner;
    document.getElementById('start-receive-scan').onclick = startReceiveScanner;
    document.getElementById('start-batch-scan').onclick = startBatchScanner;
    document.getElementById('stop-batch-scan').onclick = stopBatchScanner;
    document.getElementById('price-submit').onclick = submitWithPrice;
    document.getElementById('price-skip').onclick = submitWithDefaultPrice;
    document.getElementById('price-cancel').onclick = cancelPriceInput;
    
    window.onload = function() {};
</script>
