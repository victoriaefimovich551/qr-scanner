<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#1e3c72">
    <link rel="manifest" href="manifest.json">
    <title>QR Сканер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; padding: 16px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 20px; }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; min-width: 80px; padding: 12px 8px; background: rgba(255,255,255,0.2); border: none; border-radius: 12px; color: white; font-size: 14px; font-weight: 600; cursor: pointer; }
        .tab-btn.active { background: white; color: #1e3c72; }
        .panel { display: none; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .panel.active { display: block; }
        h2 { color: #1e3c72; margin-bottom: 20px; font-size: 20px; border-bottom: 2px solid #eef2f7; padding-bottom: 10px; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto; border-radius: 16px; overflow: hidden; }
        button { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; border: none; padding: 14px 28px; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; margin: 10px 0; width: 100%; }
        .search-box { display: flex; gap: 10px; margin: 15px 0; }
        .search-box input { flex: 1; padding: 12px; border: 2px solid #e0e4e8; border-radius: 30px; font-size: 16px; }
        .search-box button { width: auto; padding: 12px 20px; margin: 0; }
        .product-card { background: #f8fafc; border-radius: 16px; padding: 20px; margin-top: 20px; border-left: 4px solid #2a5298; }
        .product-card h3 { color: #1e3c72; margin-bottom: 15px; }
        .product-detail { margin: 8px 0; padding: 8px 0; border-bottom: 1px solid #e2e8f0; }
        .product-detail strong { display: inline-block; min-width: 110px; color: #475569; }
        .status-sold { color: #16a34a; font-weight: bold; }
        .status-reserved { color: #eab308; font-weight: bold; }
        .status-delivery { color: #3b82f6; font-weight: bold; }
        .status-unsold { color: #64748b; font-weight: bold; }
        .qr-code { text-align: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid #e2e8f0; }
        .qr-code img { max-width: 120px; border-radius: 12px; padding: 8px; background: white; }
        .error { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 12px; margin-top: 15px; text-align: center; }
        .success { background: #dcfce7; color: #16a34a; padding: 12px; border-radius: 12px; margin-top: 15px; text-align: center; }
        .loading { text-align: center; padding: 30px; color: #64748b; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; margin-top: 15px; }
        .product-item { background: #f8fafc; border-radius: 12px; padding: 15px; cursor: pointer; border: 1px solid #e2e8f0; }
        .product-item:active { transform: scale(0.98); }
        .filter-group { margin-bottom: 15px; }
        .filter-input { width: 100%; padding: 10px 15px; border: 2px solid #e0e4e8; border-radius: 30px; font-size: 14px; margin-bottom: 8px; }
        .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
        .filter-row input, .filter-row select { flex: 1; padding: 10px; border: 2px solid #e0e4e8; border-radius: 30px; font-size: 14px; background: white; }
        .btn-reset { background: #64748b; width: auto; padding: 10px 20px; margin: 0; }
        .install-banner { background: #eef2ff; padding: 12px; border-radius: 12px; margin-bottom: 15px; text-align: center; font-size: 14px; display: none; }
        .action-buttons { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .action-btn { flex: 1; background: #64748b; width: auto; padding: 10px; margin: 0; font-size: 14px; text-align: center; cursor: pointer; border: none; border-radius: 30px; color: white; }
        .delivery-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .delivery-modal-content { background: white; border-radius: 20px; padding: 20px; max-width: 90%; max-height: 80%; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #1e3c72; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #e0e4e8; border-radius: 30px; font-size: 14px; }
        .form-group textarea { border-radius: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📱 QR Сканер</h1>
        <div style="margin-top: 8px;">
            <a href="generator.html" target="_blank" style="background: rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 20px; color: white; text-decoration: none; font-size: 12px; display: inline-block;">
                🖨️ Создать наклейки
            </a>
        </div>
    </div>
    
    <div id="install-banner" class="install-banner">
        <div id="android-install" style="display: none;"><button id="install-btn">📲 Установить</button></div>
        <div id="ios-install" style="display: none;">📱 Поделиться → На экран «Домой»</div>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('scan')">📷 Сканер</button>
        <button class="tab-btn" onclick="switchTab('search')">🔍 Поиск</button>
        <button class="tab-btn" onclick="switchTab('catalog')">📦 Каталог</button>
        <button class="tab-btn" onclick="switchTab('receive')">➕ Приёмка</button>
    </div>
    
    <div id="scan-panel" class="panel active">
        <h2>📷 Поиск по QR-коду</h2>
        <div id="reader"></div>
        <div id="scan-result"></div>
        <button id="start-scan-btn">▶ Запустить камеру</button>
    </div>
    
    <div id="search-panel" class="panel">
        <h2>🔍 Поиск по артикулу</h2>
        <div class="search-box">
            <input type="text" id="serial-input" placeholder="Введите артикул (MN2-001)">
            <button onclick="searchBySerial()">Найти</button>
        </div>
        <div id="search-result"></div>
    </div>
    
    <div id="catalog-panel" class="panel">
        <h2>📦 Каталог</h2>
        <div class="filter-group">
            <input type="text" id="search-name" class="filter-input" placeholder="🔍 Поиск по названию...">
            <div class="filter-row">
                <select id="filter-status">
                    <option value="">Все статусы</option>
                    <option value="продан">Продан</option>
                    <option value="не продан">Не продан</option>
                    <option value="зарезервирован">Зарезервирован</option>
                    <option value="в доставке">В доставке</option>
                </select>
                <input type="number" id="price-min" placeholder="💰 Цена от">
                <input type="number" id="price-max" placeholder="💰 Цена до">
            </div>
            <div class="filter-row">
                <select id="sort-by">
                    <option value="name_asc">По названию</option>
                    <option value="price_asc">По цене (дешёвые)</option>
                </select>
                <button id="reset-filters" class="btn-reset">Сбросить</button>
            </div>
        </div>
        <div id="catalog-content" class="loading">⏳ Загрузка...</div>
    </div>
    
    <div id="receive-panel" class="panel">
        <h2>➕ Приёмка нового товара</h2>
        <p style="color: #666; margin-bottom: 15px;">Заполните информацию о новом товаре</p>
        
        <div class="form-group">
            <label>🚁 Модель *</label>
            <select id="receive-model">
                <option value="">Выберите модель</option>
                <option value="DJI Mini 2">DJI Mini 2</option>
                <option value="DJI Mini 2 тушка">DJI Mini 2 тушка</option>
                <option value="DJI Air 2s">DJI Air 2s</option>
                <option value="DJI Air 2s combo">DJI Air 2s combo</option>
                <option value="DJI Air 2s тушка">DJI Air 2s тушка</option>
                <option value="DJI Air 2 тушка">DJI Air 2 тушка</option>
                <option value="DJI Air 3">DJI Air 3</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>🔢 Серийный номер (заводской)</label>
            <input type="text" id="receive-serial" placeholder="Например: 3YTBJ4900301RC">
        </div>
        
        <div class="form-group">
            <label>💰 Цена закупки</label>
            <input type="number" id="receive-price" placeholder="0">
        </div>
        
        <div class="form-group">
            <label>📝 Состояние / Описание</label>
            <textarea id="receive-description" rows="3" placeholder="Состояние, комплектация, примечания..."></textarea>
        </div>
        
        <div id="receive-result"></div>
        <button id="submit-receive-btn" style="background: #16a34a;">✅ Добавить товар</button>
        <button id="clear-receive-btn" style="background: #64748b;">🗑️ Очистить</button>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwtyJuhNQJwnIAOihy2yPkfxkymqf6-wNNQX-wWL_SdiR8eChy_YHyT8uPxuoUfpTR9ng/exec';
    
    let html5QrCode = null;
    let isScanning = false;
    let allProducts = [];
    let currentProduct = null;
    
    // PWA
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const isAndroid = /Android/.test(navigator.userAgent);
    if (isAndroid) {
        document.getElementById('android-install').style.display = 'block';
        document.getElementById('install-banner').style.display = 'block';
        let deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });
        document.getElementById('install-btn')?.addEventListener('click', async () => {
            if (!deferredPrompt) { alert('Установка через Chrome'); return; }
            deferredPrompt.prompt();
            deferredPrompt = null;
        });
    } else if (isIOS) {
        document.getElementById('ios-install').style.display = 'block';
        document.getElementById('install-banner').style.display = 'block';
    }
    
    function switchTab(tab) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab + '-panel').classList.add('active');
        event.target.classList.add('active');
        if (tab === 'catalog') loadCatalog();
        if (tab === 'scan' && html5QrCode && isScanning) {
            html5QrCode.stop().then(() => isScanning = false);
        }
    }
    
    async function startScanner() {
        const resultDiv = document.getElementById('scan-result');
        resultDiv.innerHTML = '<div class="loading">📷 Запуск камеры...</div>';
        if (html5QrCode && isScanning) await html5QrCode.stop();
        html5QrCode = new Html5Qrcode("reader");
        try {
            await html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 300, height: 300 } },
                (text) => handleScanResult(text),
                (err) => console.log(err)
            );
            isScanning = true;
            resultDiv.innerHTML = '<div class="success">✅ Камера работает. Наведите на QR-код.</div>';
        } catch(e) {
            resultDiv.innerHTML = '<div class="error">❌ Ошибка камеры.</div>';
        }
    }
    
    async function handleScanResult(qrData) {
        if (html5QrCode && isScanning) {
            await html5QrCode.stop();
            isScanning = false;
        }
        const resultDiv = document.getElementById('scan-result');
        resultDiv.innerHTML = '<div class="loading">🔍 Поиск...</div>';
        try {
            const product = await findProductBySKU(qrData);
            currentProduct = product;
            displayProduct(product, 'scan-result');
        } catch(e) {
            resultDiv.innerHTML = `<div class="error">❌ ${e.message}</div>`;
        }
    }
    
    async function searchBySerial() {
        const sku = document.getElementById('serial-input').value.trim();
        const resultDiv = document.getElementById('search-result');
        if (!sku) {
            resultDiv.innerHTML = '<div class="error">❌ Введите артикул</div>';
            return;
        }
        resultDiv.innerHTML = '<div class="loading">🔍 Поиск...</div>';
        try {
            const product = await findProductBySKU(sku);
            currentProduct = product;
            displayProduct(product, 'search-result');
        } catch(e) {
            resultDiv.innerHTML = `<div class="error">❌ ${e.message}</div>`;
        }
    }
    
    async function findProductBySKU(sku) {
        const res = await fetch(`${GOOGLE_SCRIPT_URL}?serial=${encodeURIComponent(sku)}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        return data;
    }
    
    function getStatusClass(status) {
        switch(status) {
            case 'продан': return 'status-sold';
            case 'зарезервирован': return 'status-reserved';
            case 'в доставке': return 'status-delivery';
            default: return 'status-unsold';
        }
    }
    
    function getStatusText(status) {
        switch(status) {
            case 'продан': return '✅ Продан';
            case 'зарезервирован': return '🔒 Зарезервирован';
            case 'в доставке': return '🚚 В доставке';
            default: return '📦 Не продан';
        }
    }
    
    function displayProduct(p, containerId) {
        const container = document.getElementById(containerId);
        
        let затратыРемонт = p['Затраты ремонт'];
        if (затратыРемонт && !isNaN(parseFloat(затратыРемонт))) {
            затратыРемонт = `${parseFloat(затратыРемонт).toLocaleString('ru-RU')} ₽`;
        }
        
        let затратыДоставка = p['Затраты доставка'];
        if (затратыДоставка && !isNaN(parseFloat(затратыДоставка))) {
            затратыДоставка = `${parseFloat(затратыДоставка).toLocaleString('ru-RU')} ₽`;
        }
        
        let ценаЗакупка = p['Цена закупка'];
        if (ценаЗакупка && !isNaN(parseFloat(ценаЗакупка))) {
            ценаЗакупка = `${parseFloat(ценаЗакупка).toLocaleString('ru-RU')} ₽`;
        }
        
        let ценаПродажа = p['Цена продажа'];
        if (ценаПродажа && !isNaN(parseFloat(ценаПродажа))) {
            ценаПродажа = `${parseFloat(ценаПродажа).toLocaleString('ru-RU')} ₽`;
        }
        
        let прибыль = p['Прибыль'];
        if (прибыль && !isNaN(parseFloat(прибыль))) {
            прибыль = `${parseFloat(прибыль).toLocaleString('ru-RU')} ₽`;
        }
        
        const statusClass = getStatusClass(p['Статус']);
        const statusText = getStatusText(p['Статус']);
        
        let html = `<div class="product-card">
            <h3>🚁 ${escapeHtml(p['Название'] || 'Без названия')}</h3>
            <div class="product-detail"><strong>🔢 Артикул:</strong> ${escapeHtml(p['Артикул'] || '—')}</div>
            <div class="product-detail"><strong>📇 Серийный номер:</strong> ${escapeHtml(p['Серийный номер'] || '—')}</div>
            <div class="product-detail"><strong>📝 Состояние:</strong> ${escapeHtml(p['Состояние'] || '—')}</div>
            <div class="product-detail"><strong>💰 Цена закупки:</strong> ${ценаЗакупка || '—'}</div>
            <div class="product-detail"><strong>💰 Цена продажи:</strong> ${ценаПродажа || '—'}</div>`;
        
        if (затратыРемонт) {
            html += `<div class="product-detail"><strong>🔧 Затраты (ремонт):</strong> ${затратыРемонт}</div>`;
        }
        if (затратыДоставка) {
            html += `<div class="product-detail"><strong>📦 Затраты (доставка):</strong> ${затратыДоставка}</div>`;
        }
        if (прибыль) {
            html += `<div class="product-detail"><strong>💰 Прибыль:</strong> ${прибыль}</div>`;
        }
        
        html += `<div class="product-detail"><strong>📌 Статус:</strong> <span class="${statusClass}">${statusText}</span></div>`;
        
        if (p['Ссылка на Авито']) {
            html += `<div class="product-detail"><strong>🔗 Авито:</strong> <a href="${escapeHtml(p['Ссылка на Авито'])}" target="_blank">Открыть →</a></div>`;
        }
        
        if (p['Фото']) {
            html += `<div class="product-detail"><strong>📷 Фото:</strong> <a href="${escapeHtml(p['Фото'])}" target="_blank">Посмотреть</a></div>`;
        }
        
        if (p['QR_Code']) {
            html += `<div class="qr-code"><strong>📱 QR-код:</strong><br><img src="${escapeHtml(p['QR_Code'])}" style="max-width:120px"></div>`;
        }
        
        html += `<div class="action-buttons">
            <button class="action-btn" onclick="shareProduct('${escapeHtml(p['Артикул'])}')">📤 Поделиться</button>
        </div>`;
        
        html += `</div>`;
        container.innerHTML = html;
    }
    
    async function shareProduct(sku) {
        try {
            const product = await findProductBySKU(sku);
            const shareText = `🚁 Товар: ${product['Название']}
🔢 Артикул: ${product['Артикул']}
📇 Серийный номер: ${product['Серийный номер'] || '—'}
📝 Состояние: ${product['Состояние'] || '—'}
💰 Цена закупки: ${product['Цена закупка'] || '—'} ₽
📌 Статус: ${product['Статус'] || 'не продан'}`;
            
            const productUrl = `${window.location.origin}${window.location.pathname}?sku=${encodeURIComponent(sku)}`;
            
            if (navigator.share) {
                await navigator.share({ title: `Товар: ${product['Название']}`, text: shareText, url: productUrl });
            } else {
                await navigator.clipboard.writeText(shareText + '\n\n🔗 ' + productUrl);
                alert('📋 Информация скопирована');
            }
        } catch (error) {
            alert('❌ Не удалось поделиться');
        }
    }
    
    function escapeHtml(s) {
        if (!s) return '';
        return String(s).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
    
    // ========== ПРИЁМКА ==========
    async function submitNewProduct() {
        const model = document.getElementById('receive-model').value;
        const serialNumber = document.getElementById('receive-serial').value.trim();
        const purchasePrice = document.getElementById('receive-price').value;
        const description = document.getElementById('receive-description').value;
        
        if (!model) {
            alert('Выберите модель товара');
            return;
        }
        
        const resultDiv = document.getElementById('receive-result');
        resultDiv.innerHTML = '<div class="loading">💾 Добавление товара...</div>';
        
        try {
            const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=autoAdd`, {
                method: 'POST',
                body: JSON.stringify({
                    model: model,
                    serialNumber: serialNumber,
                    purchasePrice: purchasePrice,
                    description: description
                })
            });
            const data = await response.json();
            
            if (data.success) {
                resultDiv.innerHTML = `<div class="success">${data.message}<br>🔢 Артикул: ${data.sku}<br>📱 QR-код сгенерирован</div>`;
                // Очищаем форму
                document.getElementById('receive-serial').value = '';
                document.getElementById('receive-price').value = '';
                document.getElementById('receive-description').value = '';
                // Обновляем каталог
                loadCatalog();
            } else {
                resultDiv.innerHTML = `<div class="error">❌ ${data.message}</div>`;
            }
        } catch (error) {
            resultDiv.innerHTML = `<div class="error">❌ Ошибка: ${error.message}</div>`;
        }
    }
    
    function clearReceiveForm() {
        document.getElementById('receive-model').value = '';
        document.getElementById('receive-serial').value = '';
        document.getElementById('receive-price').value = '';
        document.getElementById('receive-description').value = '';
        document.getElementById('receive-result').innerHTML = '';
    }
    
    // ========== КАТАЛОГ ==========
    function applyFilters() {
        if (!allProducts.length) return;
        const searchTerm = document.getElementById('search-name').value.toLowerCase().trim();
        const statusFilter = document.getElementById('filter-status').value;
        const priceMin = parseFloat(document.getElementById('price-min').value);
        const priceMax = parseFloat(document.getElementById('price-max').value);
        const sortBy = document.getElementById('sort-by').value;
        
        let filtered = allProducts.filter(product => {
            if (searchTerm && !(product['Название'] || '').toLowerCase().includes(searchTerm)) return false;
            if (statusFilter && product['Статус'] !== statusFilter) return false;
            const price = parseFloat(product['Цена продажа']) || 0;
            if (!isNaN(priceMin) && price < priceMin) return false;
            if (!isNaN(priceMax) && price > priceMax) return false;
            return true;
        });
        
        filtered.sort((a, b) => {
            if (sortBy === 'name_asc') return (a['Название'] || '').localeCompare(b['Название'] || '');
            if (sortBy === 'price_asc') return (parseFloat(a['Цена продажа']) || 0) - (parseFloat(b['Цена продажа']) || 0);
            return 0;
        });
        
        renderCatalog(filtered);
    }
    
    function renderCatalog(products) {
        const container = document.getElementById('catalog-content');
        if (products.length === 0) {
            container.innerHTML = '<div class="error">📭 Товары не найдены.</div>';
            return;
        }
        let html = '<div class="products-grid">';
        products.forEach(product => {
            const price = product['Цена продажа'] ? `${parseFloat(product['Цена продажа']).toLocaleString('ru-RU')} ₽` : '—';
            const statusClass = getStatusClass(product['Статус']);
            const statusText = getStatusText(product['Статус']);
            html += `<div class="product-item" onclick="viewProductDetail('${escapeHtml(product['Артикул'])}')">
                <strong>${escapeHtml(product['Название'] || 'Без названия')}</strong><br>
                <small>🔢 ${escapeHtml(product['Артикул'] || '—')}</small><br>
                <small>💰 ${price}</small><br>
                <small class="${statusClass}">${statusText}</small>
            </div>`;
        });
        html += '</div>';
        container.innerHTML = html;
    }
    
    function resetFilters() {
        document.getElementById('search-name').value = '';
        document.getElementById('filter-status').value = '';
        document.getElementById('price-min').value = '';
        document.getElementById('price-max').value = '';
        document.getElementById('sort-by').value = 'name_asc';
        applyFilters();
    }
    
    async function viewProductDetail(sku) {
        switchTab('search');
        document.getElementById('serial-input').value = sku;
        await searchBySerial();
    }
    
    async function loadCatalog() {
        const container = document.getElementById('catalog-content');
        container.innerHTML = '<div class="loading">📦 Загрузка...</div>';
        try {
            const products = await getAllProducts();
            allProducts = products;
            if (!products.length) {
                container.innerHTML = '<div class="error">📭 Товары не найдены.</div>';
                return;
            }
            applyFilters();
        } catch (error) {
            container.innerHTML = `<div class="error">❌ ${error.message}</div>`;
        }
    }
    
    async function getAllProducts() {
        const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getAll`);
        return await res.json();
    }
    
    function handleUrlParams() {
        const urlParams = new URLSearchParams(window.location.search);
        const sku = urlParams.get('sku');
        if (sku) {
            switchTab('search');
            document.getElementById('serial-input').value = sku;
            searchBySerial();
        }
    }
    
    document.getElementById('start-scan-btn').onclick = startScanner;
    document.getElementById('submit-receive-btn').onclick = submitNewProduct;
    document.getElementById('clear-receive-btn').onclick = clearReceiveForm;
    document.getElementById('search-name').addEventListener('input', applyFilters);
    document.getElementById('filter-status').addEventListener('change', applyFilters);
    document.getElementById('price-min').addEventListener('input', applyFilters);
    document.getElementById('price-max').addEventListener('input', applyFilters);
    document.getElementById('sort-by').addEventListener('change', applyFilters);
    document.getElementById('reset-filters').addEventListener('click', resetFilters);
    
    window.onload = function() {
        loadCatalog();
        handleUrlParams();
    };
</script>
</body>
</html>
