<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#1e3c72">
    <link rel="manifest" href="manifest.json">
    <title>QR Сканер - Дроны</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; padding: 16px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 20px; }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; min-width: 100px; padding: 12px 8px; background: rgba(255,255,255,0.2); border: none; border-radius: 12px; color: white; font-size: 14px; font-weight: 600; cursor: pointer; }
        .tab-btn.active { background: white; color: #1e3c72; }
        .panel { display: none; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .panel.active { display: block; }
        h2 { color: #1e3c72; margin-bottom: 20px; font-size: 20px; border-bottom: 2px solid #eef2f7; padding-bottom: 10px; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto; border-radius: 16px; overflow: hidden; }
        button { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; border: none; padding: 14px 28px; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; margin: 10px 0; width: 100%; }
        .search-box { display: flex; gap: 10px; margin: 15px 0; }
        .search-box input { flex: 1; padding: 12px; border: 2px solid #e0e4e8; border-radius: 30px; font-size: 16px; }
        .search-box button { width: auto; padding: 12px 20px; margin: 0; }
        .product-card { background: #f8fafc; border-radius: 16px; padding: 20px; margin-top: 20px; border-left: 4px solid #2a5298; position: relative; }
        .product-card h3 { color: #1e3c72; margin-bottom: 15px; }
        .product-detail { margin: 8px 0; padding: 8px 0; border-bottom: 1px solid #e2e8f0; }
        .product-detail strong { display: inline-block; min-width: 110px; color: #475569; }
        .product-detail a { color: #2a5298; text-decoration: none; }
        .qr-code { text-align: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid #e2e8f0; }
        .qr-code img { max-width: 120px; border-radius: 12px; padding: 8px; background: white; }
        .error { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 12px; margin-top: 15px; text-align: center; }
        .success { background: #dcfce7; color: #16a34a; padding: 12px; border-radius: 12px; margin-top: 15px; text-align: center; }
        .loading { text-align: center; padding: 30px; color: #64748b; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; margin-top: 15px; }
        .product-item { background: #f8fafc; border-radius: 12px; padding: 15px; cursor: pointer; border: 1px solid #e2e8f0; }
        .product-item:active { transform: scale(0.98); }
        .filter-group { margin-bottom: 15px; }
        .filter-input { width: 100%; padding: 10px 15px; border: 2px solid #e0e4e8; border-radius: 30px; font-size: 14px; margin-bottom: 8px; }
        .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
        .filter-row input, .filter-row select { flex: 1; padding: 10px; border: 2px solid #e0e4e8; border-radius: 30px; font-size: 14px; background: white; }
        .btn-reset { background: #64748b; width: auto; padding: 10px 20px; margin: 0; }
        .install-banner { background: #eef2ff; padding: 12px; border-radius: 12px; margin-bottom: 15px; text-align: center; font-size: 14px; display: none; }
        .install-banner button { background: #1e3c72; width: auto; padding: 8px 20px; margin: 5px 0 0; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📱 QR Сканер</h1>
        <p>Система учета дронов</p>
    </div>
    
    <div id="install-banner" class="install-banner">
        <div id="android-install" style="display: none;">
            📲 Установите приложение на телефон<br>
            <button id="install-btn">Установить</button>
        </div>
        <div id="ios-install" style="display: none;">
            📱 Чтобы установить приложение на iPhone:<br>
            <span style="font-size: 13px; display: inline-block; margin: 5px 0;">
                1️⃣ Нажмите кнопку «Поделиться» 📤<br>
                2️⃣ Выберите «На экран «Домой»» ➕<br>
                3️⃣ Нажмите «Добавить» ✅
            </span>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('scan')">📷 Сканер</button>
        <button class="tab-btn" onclick="switchTab('search')">🔍 Поиск</button>
        <button class="tab-btn" onclick="switchTab('catalog')">📦 Каталог</button>
    </div>
    
    <div id="scan-panel" class="panel active">
        <h2>📷 Наведите на QR-код</h2>
        <div id="reader"></div>
        <div id="scan-result"></div>
        <button id="start-scan-btn">▶ Запустить камеру</button>
    </div>
    
    <div id="search-panel" class="panel">
        <h2>🔍 Поиск по серийному номеру</h2>
        <div class="search-box">
            <input type="text" id="serial-input" placeholder="Введите серийный номер">
            <button onclick="searchBySerial()">Найти</button>
        </div>
        <div id="search-result"></div>
    </div>
    
    <div id="catalog-panel" class="panel">
        <h2>📦 Каталог дронов</h2>
        
        <div class="filter-group">
            <input type="text" id="search-name" class="filter-input" placeholder="🔍 Поиск по названию...">
            
            <div class="filter-row">
                <input type="text" id="filter-category" placeholder="📂 Категория">
                <input type="number" id="price-min" placeholder="💰 Цена от">
                <input type="number" id="price-max" placeholder="💰 Цена до">
            </div>
            
            <div class="filter-row">
                <select id="sort-by">
                    <option value="name_asc">📋 По названию (А-Я)</option>
                    <option value="name_desc">📋 По названию (Я-А)</option>
                    <option value="price_asc">💵 По цене (сначала дешёвые)</option>
                    <option value="price_desc">💵 По цене (сначала дорогие)</option>
                </select>
                <button id="reset-filters" class="btn-reset">🔄 Сбросить</button>
            </div>
        </div>
        
        <div id="catalog-content" class="loading">⏳ Загрузка каталога...</div>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZeRvOc6oT7-jZ7YjpxpoK3l1UWAEcvKluoy1qAgo9sE0lU-7604yx7-2Ky9GD8hKU7g/exec';
    
    let html5QrCode = null;
    let isScanning = false;
    let allProducts = [];
    
    // ========== PWA: УСТАНОВКА НА ТЕЛЕФОН ==========
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const isAndroid = /Android/.test(navigator.userAgent);
    
    const androidBanner = document.getElementById('android-install');
    const iosBanner = document.getElementById('ios-install');
    const installBanner = document.getElementById('install-banner');
    
    if (isAndroid) {
        androidBanner.style.display = 'block';
        installBanner.style.display = 'block';
        
        let deferredPrompt = null;
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });
        
        const installBtn = document.getElementById('install-btn');
        if (installBtn) {
            installBtn.addEventListener('click', async () => {
                if (!deferredPrompt) {
                    alert('Установка доступна через браузер Chrome');
                    return;
                }
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBanner.style.display = 'none';
                }
                deferredPrompt = null;
            });
        }
    } 
    else if (isIOS) {
        iosBanner.style.display = 'block';
        installBanner.style.display = 'block';
    }
    
    // ========== ОБРАБОТКА ССЫЛКИ С СЕРИЙНЫМ НОМЕРОМ ==========
    async function handleUrlParams() {
        const urlParams = new URLSearchParams(window.location.search);
        const serial = urlParams.get('serial');
        if (serial) {
            // Показываем вкладку поиска и ищем товар
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('search-panel').classList.add('active');
            document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
            document.getElementById('serial-input').value = serial;
            await searchBySerial();
        }
    }
    
    // ========== ВКЛАДКИ ==========
    function switchTab(tab) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab + '-panel').classList.add('active');
        event.target.classList.add('active');
        if (tab === 'catalog') loadCatalog();
        if (tab === 'scan' && html5QrCode && isScanning) {
            html5QrCode.stop().then(() => isScanning = false);
        }
    }
    
    // ========== СКАНЕР ==========
    async function startScanner() {
        const resultDiv = document.getElementById('scan-result');
        resultDiv.innerHTML = '<div class="loading">📷 Запуск камеры...</div>';
        if (html5QrCode && isScanning) await html5QrCode.stop();
        html5QrCode = new Html5Qrcode("reader");
        try {
            await html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 300, height: 300 } },
                (text) => handleScanResult(text),
                (err) => console.log(err)
            );
            isScanning = true;
            resultDiv.innerHTML = '<div class="success">✅ Камера работает. Наведите на QR-код.</div>';
        } catch(e) {
            resultDiv.innerHTML = '<div class="error">❌ Ошибка камеры. Проверьте разрешения.</div>';
        }
    }
    
    async function handleScanResult(qrData) {
        if (html5QrCode && isScanning) {
            await html5QrCode.stop();
            isScanning = false;
        }
        const resultDiv = document.getElementById('scan-result');
        resultDiv.innerHTML = '<div class="loading">🔍 Поиск...</div>';
        try {
            const product = await findProductBySerial(qrData);
            displayProduct(product, 'scan-result');
        } catch(e) {
            resultDiv.innerHTML = `<div class="error">❌ ${e.message}</div>`;
        }
    }
    
    // ========== ПОИСК ==========
    async function searchBySerial() {
        const serial = document.getElementById('serial-input').value.trim();
        const resultDiv = document.getElementById('search-result');
        if (!serial) {
            resultDiv.innerHTML = '<div class="error">❌ Введите серийный номер</div>';
            return;
        }
        resultDiv.innerHTML = '<div class="loading">🔍 Поиск...</div>';
        try {
            const product = await findProductBySerial(serial);
            displayProduct(product, 'search-result');
        } catch(e) {
            resultDiv.innerHTML = `<div class="error">❌ ${e.message}</div>`;
        }
    }
    
    async function findProductBySerial(serial) {
        const res = await fetch(`${GOOGLE_SCRIPT_URL}?serial=${encodeURIComponent(serial)}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        return data;
    }
    
    // ========== ПОДЕЛИТЬСЯ (отправляем ссылку с серийным номером) ==========
    async function shareProductFromCard(serialNumber) {
        try {
            const product = await findProductBySerial(serialNumber);
            
            // Формируем текст для сообщения
            const shareText = `🚁 Дрон: ${product['Название'] || 'Без названия'}
📇 Серийный номер: ${product['Серийный номер'] || '—'}
📝 Описание: ${product['Описание'] || '—'}
💰 Затраты: ${product['Затраты'] || '—'} ₽
🛒 Закупка: ${product['Закупка'] || '—'}`;
            
            // Ссылка на этот товар
            const productUrl = `${window.location.origin}${window.location.pathname}?serial=${encodeURIComponent(serialNumber)}`;
            
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: `Дрон: ${product['Название'] || 'Без названия'}`,
                        text: shareText,
                        url: productUrl
                    });
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        await copyToClipboard(shareText + '\n\n🔗 ' + productUrl);
                        alert('📋 Информация и ссылка скопированы в буфер обмена');
                    }
                }
            } else {
                await copyToClipboard(shareText + '\n\n🔗 ' + productUrl);
                alert('📋 Информация и ссылка скопированы в буфер обмена');
            }
        } catch (error) {
            console.error('Ошибка:', error);
            alert('❌ Не удалось поделиться');
        }
    }
    
    async function copyToClipboard(text) {
        try {
            await navigator.clipboard.writeText(text);
        } catch (err) {
            console.error('Ошибка копирования:', err);
        }
    }
    
    // ========== ОТОБРАЖЕНИЕ ТОВАРА ==========
    function displayProduct(p, containerId) {
        const container = document.getElementById(containerId);
        let затраты = p['Затраты'];
        if (затраты && !isNaN(parseFloat(затраты))) {
            затраты = `${parseFloat(затраты).toLocaleString('ru-RU')} ₽`;
        }
        let price = p['Цена'];
        if (price && !isNaN(parseFloat(price))) {
            price = `${parseFloat(price).toLocaleString('ru-RU')} ₽`;
        }
        
        let html = `<div class="product-card">
            <h3>🚁 ${escapeHtml(p['Название'] || 'Без названия')}</h3>
            <div class="product-detail"><strong>📇 Серийный номер:</strong> ${escapeHtml(p['Серийный номер'] || '—')}</div>
            <div class="product-detail"><strong>📝 Описание:</strong> ${escapeHtml(p['Описание'] || '—')}</div>`;
        
        if (p['Категория']) {
            html += `<div class="product-detail"><strong>📂 Категория:</strong> ${escapeHtml(p['Категория'])}</div>`;
        }
        if (price) {
            html += `<div class="product-detail"><strong>💰 Цена:</strong> ${price}</div>`;
        }
        
        html += `<div class="product-detail"><strong>💰 Затраты:</strong> ${затраты || '—'}</div>
            <div class="product-detail"><strong>🛒 Закупка:</strong> ${escapeHtml(p['Закупка'] || '—')}</div>`;
        
        if (p['Ссылка на объявление Авито']) {
            html += `<div class="product-detail"><strong>🔗 Авито:</strong> <a href="${escapeHtml(p['Ссылка на объявление Авито'])}" target="_blank">Открыть →</a></div>`;
        } else {
            html += `<div class="product-detail"><strong>🔗 Авито:</strong> —</div>`;
        }
        
        if (p['QR_Code']) {
            html += `<div class="qr-code"><strong>📱 QR-код:</strong><br><img src="${escapeHtml(p['QR_Code'])}" style="max-width:120px"></div>`;
        }
        
        // Кнопка "Поделиться"
        html += `<div style="margin-top: 15px; text-align: center;">
            <button onclick="shareProductFromCard('${escapeHtml(p['Серийный номер'])}')" style="background: #64748b; width: auto; padding: 8px 20px; margin: 0; border: none; border-radius: 30px; color: white; cursor: pointer;">📤 Поделиться</button>
        </div>`;
        
        html += `</div>`;
        container.innerHTML = html;
    }
    
    function escapeHtml(s) {
        if (!s) return '';
        return String(s).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
    
    // ========== ФИЛЬТРЫ ==========
    function applyFilters() {
        if (!allProducts.length) return;
        
        const searchTerm = document.getElementById('search-name').value.toLowerCase().trim();
        const categoryFilter = document.getElementById('filter-category').value.toLowerCase().trim();
        const priceMin = parseFloat(document.getElementById('price-min').value);
        const priceMax = parseFloat(document.getElementById('price-max').value);
        const sortBy = document.getElementById('sort-by').value;
        
        let filtered = allProducts.filter(product => {
            if (searchTerm) {
                const name = (product['Название'] || '').toLowerCase();
                if (!name.includes(searchTerm)) return false;
            }
            if (categoryFilter) {
                const category = (product['Категория'] || '').toLowerCase();
                if (!category.includes(categoryFilter)) return false;
            }
            const price = parseFloat(product['Цена']) || 0;
            if (!isNaN(priceMin) && price < priceMin) return false;
            if (!isNaN(priceMax) && price > priceMax) return false;
            return true;
        });
        
        filtered.sort((a, b) => {
            switch(sortBy) {
                case 'name_asc': return (a['Название'] || '').localeCompare(b['Название'] || '');
                case 'name_desc': return (b['Название'] || '').localeCompare(a['Название'] || '');
                case 'price_asc': return (parseFloat(a['Цена']) || 0) - (parseFloat(b['Цена']) || 0);
                case 'price_desc': return (parseFloat(b['Цена']) || 0) - (parseFloat(a['Цена']) || 0);
                default: return 0;
            }
        });
        
        renderCatalog(filtered);
    }
    
    function renderCatalog(products) {
        const container = document.getElementById('catalog-content');
        if (products.length === 0) {
            container.innerHTML = '<div class="error">📭 Товары не найдены.</div>';
            return;
        }
        let html = '<div class="products-grid">';
        products.forEach(product => {
            const price = product['Цена'] ? `${parseFloat(product['Цена']).toLocaleString('ru-RU')} ₽` : '—';
            html += `
                <div class="product-item" onclick="viewProductDetail('${escapeHtml(product['Серийный номер'])}')">
                    <strong>${escapeHtml(product['Название'] || 'Без названия')}</strong><br>
                    <small>📇 ${escapeHtml(product['Серийный номер'] || '—')}</small><br>
                    <small>💰 ${price}</small>
                    ${product['Категория'] ? `<br><small>📂 ${escapeHtml(product['Категория'])}</small>` : ''}
                </div>
            `;
        });
        html += '</div>';
        container.innerHTML = html;
    }
    
    function resetFilters() {
        document.getElementById('search-name').value = '';
        document.getElementById('filter-category').value = '';
        document.getElementById('price-min').value = '';
        document.getElementById('price-max').value = '';
        document.getElementById('sort-by').value = 'name_asc';
        applyFilters();
    }
    
    async function viewProductDetail(serialNumber) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('search-panel').classList.add('active');
        document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
        document.getElementById('serial-input').value = serialNumber;
        await searchBySerial();
    }
    
    async function loadCatalog() {
        const container = document.getElementById('catalog-content');
        container.innerHTML = '<div class="loading">📦 Загрузка каталога...</div>';
        try {
            const products = await getAllProducts();
            allProducts = products;
            if (!products.length) {
                container.innerHTML = '<div class="error">📭 Товары не найдены.</div>';
                return;
            }
            applyFilters();
        } catch (error) {
            container.innerHTML = `<div class="error">❌ ${error.message}</div>`;
        }
    }
    
    async function getAllProducts() {
        const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getAll`);
        return await res.json();
    }
    
    // ========== ОБРАБОТЧИКИ ==========
    document.getElementById('start-scan-btn').onclick = startScanner;
    document.getElementById('search-name').addEventListener('input', applyFilters);
    document.getElementById('filter-category').addEventListener('input', applyFilters);
    document.getElementById('price-min').addEventListener('input', applyFilters);
    document.getElementById('price-max').addEventListener('input', applyFilters);
    document.getElementById('sort-by').addEventListener('change', applyFilters);
    document.getElementById('reset-filters').addEventListener('click', resetFilters);
    
    // При загрузке страницы проверяем URL на наличие серийного номера
    window.onload = function() {
        loadCatalog();
        handleUrlParams();
    };
</script>
</body>
</html>
