<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>QR Сканер - Дроны</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; padding: 16px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 20px; }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; min-width: 100px; padding: 12px 8px; background: rgba(255,255,255,0.2); border: none; border-radius: 12px; color: white; font-size: 14px; font-weight: 600; cursor: pointer; }
        .tab-btn.active { background: white; color: #1e3c72; }
        .panel { display: none; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .panel.active { display: block; }
        h2 { color: #1e3c72; margin-bottom: 20px; font-size: 20px; border-bottom: 2px solid #eef2f7; padding-bottom: 10px; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto; border-radius: 16px; overflow: hidden; }
        button { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; border: none; padding: 14px 28px; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; margin: 10px 0; width: 100%; }
        .search-box { display: flex; gap: 10px; margin: 15px 0; }
        .search-box input { flex: 1; padding: 12px; border: 2px solid #e0e4e8; border-radius: 30px; font-size: 16px; }
        .search-box button { width: auto; padding: 12px 20px; margin: 0; }
        .product-card { background: #f8fafc; border-radius: 16px; padding: 20px; margin-top: 20px; border-left: 4px solid #2a5298; }
        .product-card h3 { color: #1e3c72; margin-bottom: 15px; }
        .product-detail { margin: 8px 0; padding: 8px 0; border-bottom: 1px solid #e2e8f0; }
        .product-detail strong { display: inline-block; min-width: 110px; color: #475569; }
        .product-detail a { color: #2a5298; text-decoration: none; }
        .qr-code { text-align: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid #e2e8f0; }
        .qr-code img { max-width: 120px; border-radius: 12px; padding: 8px; background: white; }
        .error { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 12px; margin-top: 15px; text-align: center; }
        .success { background: #dcfce7; color: #16a34a; padding: 12px; border-radius: 12px; margin-top: 15px; text-align: center; }
        .loading { text-align: center; padding: 30px; color: #64748b; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; margin-top: 15px; }
        .product-item { background: #f8fafc; border-radius: 12px; padding: 15px; cursor: pointer; border: 1px solid #e2e8f0; }
        .product-item:active { transform: scale(0.98); }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>📱 QR Сканер</h1><p>Система учета дронов</p></div>
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('scan')">📷 Сканер</button>
        <button class="tab-btn" onclick="switchTab('search')">🔍 Поиск</button>
        <button class="tab-btn" onclick="switchTab('catalog')">📦 Каталог</button>
    </div>
    <div id="scan-panel" class="panel active">
        <h2>📷 Наведите на QR-код</h2>
        <div id="reader"></div>
        <div id="scan-result"></div>
        <button id="start-scan-btn">▶ Запустить камеру</button>
    </div>
    <div id="search-panel" class="panel">
        <h2>🔍 Поиск по серийному номеру</h2>
        <div class="search-box">
            <input type="text" id="serial-input" placeholder="Введите серийный номер">
            <button onclick="searchBySerial()">Найти</button>
        </div>
        <div id="search-result"></div>
    </div>
    <div id="catalog-panel" class="panel">
    <h2>📦 Каталог дронов</h2>
    <!-- Блок фильтрации -->
    <div style="margin-bottom: 15px;">
        <input type="text" id="search-name" placeholder="🔍 Поиск по названию..." 
               style="width: 100%; padding: 12px; border-radius: 30px; border: 2px solid #e0e4e8; font-size: 14px; margin-bottom: 10px;">
        
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <input type="text" id="filter-category" placeholder="📂 Категория" 
                   style="flex: 1; padding: 10px; border-radius: 30px; border: 2px solid #e0e4e8; font-size: 14px;">
            <input type="number" id="price-min" placeholder="Цена от" 
                   style="flex: 1; padding: 10px; border-radius: 30px; border: 2px solid #e0e4e8; font-size: 14px;">
            <input type="number" id="price-max" placeholder="Цена до" 
                   style="flex: 1; padding: 10px; border-radius: 30px; border: 2px solid #e0e4e8; font-size: 14px;">
        </div>
        
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <select id="sort-by" style="flex: 1; padding: 10px; border-radius: 30px; border: 2px solid #e0e4e8; background: white;">
                <option value="name_asc">По названию (А-Я)</option>
                <option value="name_desc">По названию (Я-А)</option>
                <option value="price_asc">По цене (сначала дешёвые)</option>
                <option value="price_desc">По цене (сначала дорогие)</option>
            </select>
            <button id="reset-filters" style="width: auto; padding: 10px 20px; margin: 0; background: #64748b;">Сбросить</button>
        </div>
    </div>
    
    <div id="catalog-content" class="loading">⏳ Загрузка каталога...</div>
</div>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZeRvOc6oT7-jZ7YjpxpoK3l1UWAEcvKluoy1qAgo9sE0lU-7604yx7-2Ky9GD8hKU7g/exec';
    let html5QrCode = null, isScanning = false;
    
    function switchTab(tab) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab + '-panel').classList.add('active');
        event.target.classList.add('active');
        if (tab === 'catalog') loadCatalog();
        if (tab === 'scan' && html5QrCode && isScanning) html5QrCode.stop().then(() => isScanning = false);
    }
    
    async function startScanner() {
        const resultDiv = document.getElementById('scan-result');
        resultDiv.innerHTML = '<div class="loading">📷 Запуск камеры...</div>';
        if (html5QrCode && isScanning) await html5QrCode.stop();
        html5QrCode = new Html5Qrcode("reader");
        try {
            await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 300, height: 300 } },
                (text) => handleScanResult(text), (err) => console.log(err));
            isScanning = true;
            resultDiv.innerHTML = '<div class="success">✅ Камера работает. Наведите на QR-код.</div>';
        } catch(e) { resultDiv.innerHTML = '<div class="error">❌ Ошибка камеры. Проверьте разрешения.</div>'; }
    }
    
    async function handleScanResult(qrData) {
        if (html5QrCode && isScanning) { await html5QrCode.stop(); isScanning = false; }
        const resultDiv = document.getElementById('scan-result');
        resultDiv.innerHTML = '<div class="loading">🔍 Поиск...</div>';
        try {
            const product = await findProductBySerial(qrData);
            displayProduct(product, 'scan-result');
        } catch(e) { resultDiv.innerHTML = `<div class="error">❌ ${e.message}</div>`; }
    }
    
    async function searchBySerial() {
        const serial = document.getElementById('serial-input').value.trim();
        const resultDiv = document.getElementById('search-result');
        if (!serial) { resultDiv.innerHTML = '<div class="error">❌ Введите номер</div>'; return; }
        resultDiv.innerHTML = '<div class="loading">🔍 Поиск...</div>';
        try {
            const product = await findProductBySerial(serial);
            displayProduct(product, 'search-result');
        } catch(e) { resultDiv.innerHTML = `<div class="error">❌ ${e.message}</div>`; }
    }
    
    async function findProductBySerial(serial) {
        const res = await fetch(`${GOOGLE_SCRIPT_URL}?serial=${encodeURIComponent(serial)}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        return data;
    }
    
    function displayProduct(p, containerId) {
        const container = document.getElementById(containerId);
        let затраты = p['Затраты'];
        if (затраты && !isNaN(parseFloat(затраты))) затраты = `${parseFloat(затраты).toLocaleString('ru-RU')} ₽`;
        let html = `<div class="product-card"><h3>🚁 ${escapeHtml(p['Название'] || 'Без названия')}</h3>
            <div class="product-detail"><strong>📇 Серийный номер:</strong> ${escapeHtml(p['Серийный номер'] || '—')}</div>
            <div class="product-detail"><strong>📝 Описание:</strong> ${escapeHtml(p['Описание'] || '—')}</div>
            <div class="product-detail"><strong>💰 Затраты:</strong> ${затраты || '—'}</div>
            <div class="product-detail"><strong>🛒 Закупка:</strong> ${escapeHtml(p['Закупка'] || '—')}</div>`;
        if (p['Ссылка на объявление Авито']) {
            html += `<div class="product-detail"><strong>🔗 Авито:</strong> <a href="${escapeHtml(p['Ссылка на объявление Авито'])}" target="_blank">Открыть →</a></div>`;
        } else { html += `<div class="product-detail"><strong>🔗 Авито:</strong> —</div>`; }
        if (p['QR_Code']) { html += `<div class="qr-code"><strong>📱 QR-код:</strong><br><img src="${escapeHtml(p['QR_Code'])}" style="max-width:120px"></div>`; }
        html += `</div>`;
        container.innerHTML = html;
    }
    
    function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    async function loadCatalog() {
        const container = document.getElementById('catalog-content');
        container.innerHTML = '<div class="loading">📦 Загрузка...</div>';
        try {
            const products = await getAllProducts();
            if (!products.length) { container.innerHTML = '<div class="error">📭 Нет товаров</div>'; return; }
            let html = '<div class="products-grid">';
            products.forEach(p => { html += `<div class="product-item" onclick="viewProductDetail('${escapeHtml(p['Серийный номер'])}')">
                <strong>${escapeHtml(p['Название'] || 'Без названия')}</strong><br><small>📇 ${escapeHtml(p['Серийный номер'] || '—')}</small></div>`; });
            html += '</div>';
            container.innerHTML = html;
        } catch(e) { container.innerHTML = `<div class="error">❌ ${e.message}</div>`; }
    }
    
    async function viewProductDetail(serial) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('search-panel').classList.add('active');
        document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
        document.getElementById('serial-input').value = serial;
        await searchBySerial();
    }
    
    async function getAllProducts() {
        const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getAll`);
        return await res.json();
    }
    
    document.getElementById('start-scan-btn').onclick = startScanner;
    window.onload = loadCatalog;
</script>
</body>
</html>
